<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>



<style>
	*, *::before, *::after {
		box-sizing: border-box;
		padding: 0;
		margin: 0;
	}

	:root {
        font-size: 11.2pt;

        --phi: calc(sqrt(1.25) + 0.5);

        --font-family-sans: 'Comme','Lato','Radio Canada',sans-serif;
		--font-family-script: 'Ruluko',var(--font-family-sans);

        --font-size-0: calc(1rem * sqrt(pow(var(--phi), -1)));
        --font-size-1: calc(1rem * sqrt(pow(var(--phi), -0.5)));
        --font-size-2: 1rem;
        --font-size-3: calc(1rem * sqrt(pow(var(--phi), 0.5)));
        --font-size-4: calc(1rem * sqrt(pow(var(--phi), 1)));
        --font-size-5: calc(1rem * sqrt(pow(var(--phi), 1.5)));
        --font-size-6: calc(1rem * sqrt(pow(var(--phi), 2)));
        --font-size-7: calc(1rem * sqrt(pow(var(--phi), 2.5)));
        --font-size-8: calc(1rem * sqrt(pow(var(--phi), 3)));
        --font-size-9: calc(1rem * sqrt(pow(var(--phi), 3.5)));

        --space-0: calc(1cap * pow(var(--phi), -3));
        --space-1: calc(var(--space-0) * pow(var(--phi), 1));
        --space-2: calc(var(--space-0) * pow(var(--phi), 2));
        --space-3: calc(var(--space-0) * pow(var(--phi), 3));
        --space-4: calc(var(--space-0) * pow(var(--phi), 4));
        --space-5: calc(var(--space-0) * pow(var(--phi), 5));
        --space-6: calc(var(--space-0) * pow(var(--phi), 6));
        --space-7: calc(var(--space-0) * pow(var(--phi), 7));
        --space-8: calc(var(--space-0) * pow(var(--phi), 8));
        --space-9: calc(var(--space-0) * pow(var(--phi), 9));

		--zoomScale: 1.08;
		--unzoomScale: calc(1 / var(--zoomScale));

		--iconSizeMax: 92px;
		--iconSizeMed: 60px;
		--iconSizeSml: 48px;
		--iconSizeMin: 42px;

		--gold-pale: #edb;
		--gold: #fd9;
		--gold-deep: #fc8;
        --aqua-pale: #293943;
        --aqua: #1f3442;
        --aqua-deep: #1b2a34;
        --brass: #525244;

        --gradient-0: linear-gradient(in oklab to bottom, var(--brass), var(--aqua-pale));
        --gradient-1: linear-gradient(in oklab to bottom, var(--aqua-pale), var(--brass));
        --gradient-2: linear-gradient(in oklab to bottom, var(--aqua-pale), var(--aqua-deep));
        --gradient-3: linear-gradient(in oklab to bottom, var(--aqua), var(--aqua-deep));

		--box-shadow:	
			0px 0px 3px 1px #000000d2, 
			0px 3px 13px 5px #111111c5;
		
		--box-shadow-focus:
			0px 0px 0px 2px var(--gold-pale),
			0px 0px 3px 3px #000000d2, 
			0px 3px 13px 7px #111111c5
	}

	body {
		width: 100dvw;
		height: 100dvh;
        font-size: var(--font-size-2);
	}

	img {
		max-width: 100%;
		max-height: 100%;
		object-fit: contain;
		display: block;

		&.icon {
			aspect-ratio: 1;

			&.max { width: 92px; }
			&.med { width: 60px; }
			&.sml { width: 48px; }
			&.min { width: 42px; }
		}
	}
	span > img {
		display: inline-block;
	}

	input[type="number"] {
		background: linear-gradient(in oklab to bottom, white 50%, #f6f6f6 81%, white);
		color: #111;
		border-radius: 4px;
		border: none;
		border-top: 1px solid white;
		box-shadow: inset 0px 1px 1px 1px #f6f6f6;
		padding: 1px 3px;
		text-align: right;

		&:disabled {
			filter: contrast(50%);
		}
	}

	button {
		display: inline-block;

		&:not([disabled]) {
			cursor: pointer;
		}
	}

	button:not([disabled]):not([interestfor]) {
		transition: 0.06s ease-out;
		
		&:hover {
			scale: var(--zoomScale);
			box-shadow:	var(--box-shadow-focus);
		}
	}
	button:not([disabled]):not([interestfor]):hover,
	*:has(button:not([disabled]):not([interestfor]):hover) {
		position: relative;
		z-index: 1;
	}
	
	a[interestfor],
	button[interestfor] {
		/* color: inherit; */
		/* text-decoration: none; */
		all: unset;
        interest-delay: 0s;
	}

	.plain {
		padding: 0;
		margin: 0;
		background: none;
		border: none;
	}

	.sheer, .sheerBackground {
		background: #7771;
	}
	.sheer, .sheerBorder {
		border: 1px solid #7771;
	}
</style>
